<!--
  IGREJA FONTE · Cajamar — Painel administrativo
  Protegido (sessão + role='admin'). Sidebar: Batismo · Financeiro · Fale com a gente.
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Painel · Igreja Fonte</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --abismo:#0a0a0b; --breu:#101013; --grafite:#17171b; --grafite-2:#1f1f25;
    --neblina:#2a2a31; --cinza:#8b8b95; --cinza-claro:#b8b8c0; --luz:#f5f5f6;
    --agua:#7ad4cf; --agua-forte:#4bb6b0; --agua-fundo:rgba(122,212,207,.10);
    --ok:#4ade80; --alerta:#f87171; --aviso:#fbbf24;
    --display:"Bricolage Grotesque",system-ui,sans-serif; --corpo:"Inter",system-ui,sans-serif;
    --raio:16px; --raio-sm:11px; --borda:1px solid var(--neblina); --sb:250px;
    --logo:url('assets/fonte-logo.png');
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--abismo);color:var(--luz);font-family:var(--corpo);line-height:1.55;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  button{font-family:var(--corpo)}
  ::selection{background:var(--agua);color:#04201f}

  .app{display:flex;min-height:100vh}

  .sidebar{width:var(--sb);flex:0 0 var(--sb);background:var(--breu);border-right:var(--borda);
           display:flex;flex-direction:column;position:fixed;inset:0 auto 0 0;z-index:30;transition:transform .28s,width .22s,flex-basis .22s}
  .sb-logo{padding:24px 22px 16px;text-align:center;border-bottom:1px solid rgba(42,42,49,.5)}
  .sb-logo .marca-logo{display:block;height:50px;width:auto;max-width:150px;margin:0 auto;object-fit:contain}
  .sb-nav{flex:1;overflow-y:auto;padding:8px 12px}
  .nav-item{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:none;border:none;
            color:var(--cinza-claro);padding:11px 12px;border-radius:var(--raio-sm);font-size:.94rem;cursor:pointer;transition:background .15s,color .15s}
  .nav-item:hover{background:rgba(255,255,255,.04);color:var(--luz)}
  .nav-item.on{background:var(--agua-fundo);color:var(--agua)}
  .nav-item svg{flex:0 0 auto}
  .nav-item .ic,.sair .ic{width:18px;height:18px;flex:0 0 auto;opacity:.82}
  .nav-item.on .ic{opacity:1}
  .sair{display:flex;align-items:center;gap:10px}
  .nav-item .chev{margin-left:auto;transition:transform .2s}
  .nav-item .ini,.sair .ini{display:none;flex:0 0 auto;width:22px;text-align:center;font-weight:700}
  .nav-item.aberto .chev{transform:rotate(90deg)}
  .subnav{overflow:hidden;max-height:0;transition:max-height .28s ease}
  .subnav.aberto{max-height:460px}
  .sub-item{display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:none;border:none;
            color:var(--cinza);padding:8px 12px 8px 40px;border-radius:var(--raio-sm);font-size:.88rem;cursor:pointer}
  .sub-item:hover{color:var(--luz)}
  .sub-item.on{color:var(--agua);background:var(--agua-fundo)}
  .sub-item .qtd{margin-left:auto;font-size:.74rem;background:var(--grafite-2);color:var(--cinza-claro);
                 border-radius:100px;padding:1px 8px;min-width:22px;text-align:center}
  .sb-rodape{border-top:var(--borda);padding:14px 16px;font-size:.82rem;color:var(--cinza)}
  .sb-rodape .quem{display:block;margin-bottom:10px;word-break:break-all}
  .sair{display:inline-flex;align-items:center;gap:8px;border:var(--borda);border-radius:100px;padding:8px 14px;
        color:var(--cinza-claro);cursor:pointer;background:none;font-size:.85rem}
  .sair:hover{border-color:var(--cinza);color:var(--luz)}

  .conteudo{flex:1;margin-left:var(--sb);min-width:0;transition:margin-left .22s}
  .topbar{display:flex;align-items:center;gap:12px;height:60px;padding:0 26px;border-bottom:var(--borda);
          position:sticky;top:0;background:rgba(10,10,11,.82);backdrop-filter:blur(12px);z-index:20}
  .topbar h1{font-family:var(--display);font-weight:700;font-size:1.15rem;flex:1;text-align:center}
  .menu-btn{display:none;background:none;border:none;color:var(--luz);cursor:pointer;padding:4px}
  .colapsar-btn{background:none;border:none;color:var(--cinza-claro);cursor:pointer;padding:4px;display:flex;align-items:center}
  .colapsar-btn:hover{color:var(--luz)}
  .colapsar-btn svg{transition:transform .2s}
  @media(min-width:861px){
    .app.recolhido .sidebar{width:72px;flex-basis:72px}
    .app.recolhido .conteudo{margin-left:72px}
    .app.recolhido .sb-logo{display:none}
    .app.recolhido .nav-item{justify-content:center;padding:12px 0}
    .app.recolhido .nav-item .lbl,.app.recolhido .nav-item .chev,
    .app.recolhido .sb-rodape .quem,.app.recolhido .sair .lbl{display:none}
    .app.recolhido .nav-item .ini,.app.recolhido .sair .ini{display:block}
    .app.recolhido .subnav{max-height:0 !important}
    .app.recolhido .sb-rodape{text-align:center;padding:14px 0}
    .app.recolhido .sair{border:none;padding:8px;justify-content:center;width:100%}
    .app.recolhido .colapsar-btn svg{transform:rotate(180deg)}
  }
  .view{padding:28px 26px 70px;max-width:1000px;margin:0 auto}
  .view-sub{color:var(--cinza);font-size:.92rem;margin:-4px 0 22px}

  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:26px}
  .card{border:var(--borda);border-radius:var(--raio);background:var(--grafite);padding:18px 20px}
  .card .rot{font-size:.82rem;color:var(--cinza)}
  .card .num{font-family:var(--display);font-weight:700;font-size:1.9rem;line-height:1.1;margin-top:4px}
  .card .num.agua{color:var(--agua)}

  .tabela{border:var(--borda);border-radius:var(--raio);overflow:hidden;background:var(--grafite)}
  .tabela .lin{display:grid;gap:10px;padding:12px 16px;border-bottom:1px solid rgba(42,42,49,.6);font-size:.9rem;align-items:center}
  .tabela.batismo .lin{grid-template-columns:1.4fr 1fr .9fr .9fr .8fr}
  .tabela.membros .lin{grid-template-columns:1.5fr .9fr 1.1fr .8fr 64px}
  .tabela.itens .lin{grid-template-columns:1.7fr 150px 1fr}
  .tabela.pessoas .lin{grid-template-columns:1.5fr 1fr 1fr 1.1fr}
  .tabela.membros .lin.off{opacity:.5}
  .sw{position:relative;display:inline-block;width:40px;height:22px;cursor:pointer}
  .sw input{position:absolute;opacity:0;width:0;height:0}
  .sw .track{position:absolute;inset:0;background:var(--neblina);border-radius:22px;transition:.2s}
  .sw .track::before{content:"";position:absolute;height:16px;width:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
  .sw input:checked + .track{background:var(--agua)}
  .sw input:checked + .track::before{transform:translateX(18px)}
  .tabela.membros .lin[data-mid]{cursor:pointer}
  .tabela.membros .lin[data-mid]:hover{background:rgba(255,255,255,.03)}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:60;padding:20px}
  .modal-bg.on{display:flex}
  .modal{background:var(--grafite);border:var(--borda);border-radius:var(--raio);max-width:560px;width:100%;max-height:88vh;overflow:auto;padding:26px 26px 20px;position:relative}
  .modal-x{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--cinza-claro);cursor:pointer;padding:4px;line-height:0}
  .modal-x:hover{color:var(--luz)}
  .modal h2{font-family:var(--display);font-size:1.45rem;margin:0 30px 2px 0}
  .modal .msub{color:var(--cinza);font-size:.84rem;margin-bottom:16px}
  .mb-pill{display:inline-block;font-size:.72rem;padding:3px 9px;border-radius:20px;margin-left:8px;vertical-align:middle}
  .mb-pill.ok{background:var(--agua-fundo);color:var(--agua)}
  .mb-pill.no{background:rgba(139,139,149,.15);color:var(--cinza-claro)}
  #mbBody h2{display:flex;align-items:center;gap:8px;min-width:0;flex-wrap:nowrap}
  #mbBody h2 .mb-nome{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #mbBody h2 .mb-pill{flex-shrink:0;margin-left:0}
  .mb-foto{width:96px;height:96px;border-radius:50%;object-fit:cover;border:2px solid var(--neblina);margin:6px 0 8px;cursor:zoom-in;display:block}
  .mb-foto-ph{display:flex;align-items:center;justify-content:center;background:var(--grafite-2);color:var(--agua);font-size:1.8rem;font-weight:700;cursor:default}
  .mb-foto-acao{margin:0 0 14px}
  .mb-foto-btn{background:var(--grafite-2);border:1px solid var(--neblina);color:var(--luz);border-radius:var(--raio-sm);padding:7px 14px;font-weight:600;cursor:pointer;font-family:inherit;font-size:.82rem}
  .mb-foto-btn:hover{border-color:var(--agua)}
  .mb-acoes{margin-top:18px;display:flex;justify-content:flex-end;gap:10px}
  .btn-del{background:transparent;border:1px solid rgba(224,80,80,.5);color:#e57373;border-radius:var(--raio-sm);padding:10px 16px;font-weight:600;cursor:pointer;font-family:inherit;font-size:.9rem}
  .btn-del:hover{background:rgba(224,80,80,.12)}
  .btn-val{background:var(--agua);color:#06201e;border:none;border-radius:var(--raio-sm);padding:10px 16px;font-weight:600;cursor:pointer;font-family:inherit;font-size:.9rem}
  .btn-val:hover{background:var(--agua-forte)}
  .btn-val.off{background:transparent;border:1px solid var(--neblina);color:var(--cinza-claro)}
  .tabela.membros .tag-val{display:inline-block;margin-left:8px;font-size:.68rem;color:#e0b341;border:1px solid rgba(224,179,65,.35);border-radius:999px;padding:1px 7px;vertical-align:middle}
  .tel-wpp{display:inline-flex;align-items:center;gap:6px;color:var(--agua);text-decoration:none}
  .tel-wpp:hover{text-decoration:underline}
  .tel-wpp .wa-ic{flex-shrink:0}
  .det-lin{display:flex;justify-content:space-between;gap:16px;padding:11px 0;border-top:1px solid rgba(42,42,49,.6);font-size:.92rem}
  .det-lin .k{color:var(--cinza);flex:0 0 auto}
  .det-lin .v{color:var(--luz);text-align:right;word-break:break-word}
  .btn-primary{background:var(--agua);color:#04211f;border:none;border-radius:var(--raio-sm);padding:11px 20px;font-weight:600;cursor:pointer;font-family:inherit;font-size:.9rem}
  .btn-primary:hover{background:var(--agua-forte)}
  .btn-ghost{background:transparent;border:var(--borda);color:var(--cinza-claro);border-radius:var(--raio-sm);padding:11px 18px;cursor:pointer;font-family:inherit;font-size:.9rem}
  .btn-danger{background:transparent;border:1px solid #7f1d1d;color:#f87171;border-radius:var(--raio-sm);padding:11px 18px;cursor:pointer;font-family:inherit;font-size:.9rem;margin-left:auto}
  .fld{margin-bottom:14px}
  .fld label{display:block;font-size:.8rem;color:var(--cinza-claro);margin-bottom:6px}
  .fld input,.fld select,.fld textarea{width:100%;background:var(--breu);border:var(--borda);border-radius:var(--raio-sm);padding:10px 12px;color:var(--luz);font-family:inherit;font-size:.92rem}
  .fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--agua-forte)}
  .f2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .fld input[type=file]{padding:8px 10px;font-size:.85rem}
  .embreve{max-width:540px;margin:48px auto;text-align:center;padding:40px 28px;border:var(--borda);border-radius:var(--raio);background:var(--breu)}
  .embreve-tag{display:inline-block;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--agua-forte);border:1px solid var(--agua-forte);border-radius:100px;padding:5px 14px;margin-bottom:16px}
  .embreve p{color:var(--cinza-claro);line-height:1.6;margin:0}
  .ithint{font-size:.72rem;color:var(--cinza);margin-top:5px;line-height:1.4}
  .chkline{display:flex;align-items:center;gap:9px;cursor:pointer;font-size:.9rem;color:var(--luz);margin-top:4px}
  .chkline input{width:18px;height:18px;accent-color:var(--agua)}
  .modal-actions{display:flex;gap:10px;margin-top:20px;align-items:center}
  .stepper{display:inline-flex;align-items:center;border:var(--borda);border-radius:8px;overflow:hidden}
  .stepper button{background:var(--breu);border:none;color:var(--luz);width:30px;height:30px;cursor:pointer;font-size:1.05rem;line-height:1}
  .stepper button:hover{background:var(--neblina)}
  .stepper .q{min-width:36px;text-align:center;font-variant-numeric:tabular-nums;font-size:.92rem}
  .tag-nec{display:inline-block;font-size:.66rem;padding:2px 8px;border-radius:20px;background:var(--agua-fundo);color:var(--agua);margin-left:8px;vertical-align:middle}
  .mini-btn{background:transparent;border:var(--borda);color:var(--cinza-claro);border-radius:8px;padding:7px 12px;font-size:.82rem;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-block}
  .mini-btn:hover{border-color:var(--cinza);color:var(--luz)}
  .mini-btn.go{border-color:var(--agua-forte);color:var(--agua)}
  .mini-btn.warn{border-color:#7f1d1d;color:#f87171}
  .sub2{color:var(--cinza);font-size:.82rem}
  .res-card{border:var(--borda);border-radius:var(--raio);background:var(--grafite);padding:16px 18px;margin-bottom:12px}
  .res-head{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:flex-start}
.c-val{font-family:var(--display);font-weight:700;font-size:1.05rem;flex:0 0 auto;white-space:nowrap}
  .res-pill{display:inline-block;font-size:.7rem;padding:2px 9px;border-radius:20px;margin-left:6px;text-transform:capitalize}
  .res-pill.aviso{background:rgba(234,179,8,.15);color:#eab308}
  .res-pill.mar{background:var(--agua-fundo);color:var(--agua)}
  .res-pill.ok{background:rgba(74,222,128,.15);color:#4ade80}
  .res-pill.off2{background:rgba(139,139,149,.15);color:var(--cinza-claro)}
  .res-itens{margin:10px 0 4px;padding:10px 0;border-top:1px solid rgba(42,42,49,.5);border-bottom:1px solid rgba(42,42,49,.5)}
  .res-itens .li{display:flex;justify-content:space-between;font-size:.9rem;padding:3px 0;color:var(--cinza-claro)}
  .res-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .subtabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .subtab{background:transparent;border:var(--borda);color:var(--cinza-claro);border-radius:100px;padding:7px 16px;font-size:.85rem;cursor:pointer;font-family:inherit}
  .subtab.on{background:var(--agua);border-color:var(--agua);color:#04211f;font-weight:600}
  .tabela .lin:last-child{border-bottom:none}
  .tabela .cab{background:var(--breu);color:var(--cinza);font-size:.74rem;letter-spacing:.06em;text-transform:uppercase;font-weight:600}
  .tabela .lin .sub{display:block;color:var(--cinza);font-size:.8rem}
  .pill{display:inline-block;padding:3px 10px;border-radius:100px;font-size:.75rem;font-weight:600}
  .pill.ok{background:rgba(74,222,128,.14);color:var(--ok)}
  .pill.pend{background:rgba(251,191,36,.14);color:var(--aviso)}
  .pill.na{background:rgba(139,139,149,.14);color:var(--cinza-claro)}
  .vazio,.carregando{padding:30px 16px;text-align:center;color:var(--cinza);font-size:.9rem}

  .cc-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px}
  .cc-bloco{border:var(--borda);border-radius:var(--raio);background:var(--grafite);overflow:hidden}
  .cc-tit{font-size:.76rem;letter-spacing:.06em;text-transform:uppercase;color:var(--cinza);font-weight:600;padding:14px 16px 10px}
  .cc-lin{display:flex;justify-content:space-between;gap:12px;padding:11px 16px;border-top:1px solid rgba(42,42,49,.5);font-size:.92rem}
  .cc-val{color:var(--cinza-claro)}
  .cc-bloco.full{margin-bottom:18px}
  @media(max-width:680px){.cc-grid{grid-template-columns:1fr}}
  .msgs{display:flex;flex-direction:column;gap:12px}
  .msg{border:var(--borda);border-radius:var(--raio);background:var(--grafite);padding:16px 18px}
  .msg .top{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:baseline}
  .msg .nome{font-weight:600}
  .msg .assunto{font-size:.74rem;color:var(--agua);background:var(--agua-fundo);border-radius:100px;padding:3px 10px;font-weight:600}
  .msg .meta{color:var(--cinza);font-size:.82rem;margin:4px 0 10px}
  .msg .corpo{color:var(--cinza-claro);font-size:.94rem;white-space:pre-wrap}
  .aviso-box{border:1px solid var(--agua-forte);background:var(--agua-fundo);border-radius:var(--raio-sm);
             padding:12px 15px;color:var(--cinza-claro);font-size:.88rem;margin-bottom:18px}

  .overlay{display:none;position:fixed;inset:0;z-index:25;background:rgba(10,10,11,.5);backdrop-filter:blur(3px)}

  @media(max-width:860px){
    .sidebar{transform:translateX(-100%)}
    .sidebar.aberto{transform:translateX(0)}
    .conteudo{margin-left:0}
    .menu-btn{display:block}
    .colapsar-btn{display:none}
    .overlay.on{display:block}
    .tabela.batismo .lin,.tabela.membros .lin,.tabela.itens .lin,.tabela.pessoas .lin{grid-template-columns:1fr;gap:2px}
    .tabela.batismo .cab,.tabela.membros .cab,.tabela.itens .cab,.tabela.pessoas .cab{display:none}
    .tabela.batismo .lin .col::before,.tabela.membros .lin .col::before,.tabela.itens .lin .col::before,.tabela.pessoas .lin .col::before{content:attr(data-l) ": ";color:var(--cinza);font-size:.74rem}
  }
</style>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sb-logo"><img class="marca-logo" src="assets/fonte-logo.png" alt="Igreja Fonte"></div>
    <nav class="sb-nav" id="sbnav">
      <button class="nav-item" data-view="batismo">
        <svg class="ic" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg><span class="lbl">Batismo</span>
      </button>
      <button class="nav-item" data-view="membros">
        <svg class="ic" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span class="lbl">Membros</span>
      </button>
      <button class="nav-item" data-view="contribuicoes">
        <svg class="ic" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 6L2 7"/></svg><span class="lbl">Contribuições</span>
      </button>
      <button class="nav-item" id="btn-fin" data-toggle="fin">
        <svg class="ic" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg><span class="lbl">Financeiro</span>
        <svg class="chev" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4l4 4-4 4"/></svg>
      </button>
      <div class="subnav" id="subnav-fin">
        <button class="sub-item" data-fin="geral">Visão geral</button>
        <button class="sub-item" data-fin="entradas">Entradas</button>
        <button class="sub-item" data-fin="saidas">Saídas</button>
      </div>
      <button class="nav-item" id="btn-acao" data-toggle="acao">

<script>
  const $=s=>document.querySelector(s), $$=s=>document.querySelectorAll(s);
  const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const dataBR=iso=>{ if(!iso) return ''; const d=new Date(iso); return d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); };

  const ASSUNTOS=['Pedido de oração','Dúvida geral','Quero conhecer a igreja','Células','Inscrições / eventos','Gabinete pastoral','Outro'];
  const VALOR_CAMISETA=42;
  let BATISMO=[], CONTATOS=[], MEMBROS=[], AITENS=[], ARES=[], APESSOAS=[], CONTRIB=[], contribStatus='declarado', contribTipo='todos', acaoTab='estoque', acaoResTab='pendente';

  const app=$('.app'), sidebar=$('#sidebar'), overlay=$('#overlay');
  const abreSidebar=v=>{ sidebar.classList.toggle('aberto',v); overlay.classList.toggle('on',v); };
  $('#menuBtn').onclick=()=>abreSidebar(!sidebar.classList.contains('aberto'));
  overlay.onclick=()=>abreSidebar(false);

  function setRecolhido(v){ app.classList.toggle('recolhido',v); try{localStorage.setItem('painelRecolhido',v?'1':'0');}catch(e){} }
  $('#colapsarBtn').onclick=()=>setRecolhido(!app.classList.contains('recolhido'));
  try{ if(localStorage.getItem('painelRecolhido')==='1') setRecolhido(true); }catch(e){}

  function marcarAtivo(view, sub){
    $$('.nav-item').forEach(b=>b.classList.toggle('on', b.dataset.view===view));
    const bc=$('#btn-contato'); if(bc) bc.classList.toggle('on', view==='contato');
    const bf=$('#btn-fin'); if(bf) bf.classList.toggle('on', view==='financeiro');
    const ba=$('#btn-acao'); if(ba) ba.classList.toggle('on', view==='acao');
    $$('#subnav-acao .sub-item').forEach(b=>b.classList.toggle('on', view==='acao' && b.dataset.acao===(sub||'estoque')));
    $$('#subnav .sub-item').forEach(b=>b.classList.toggle('on', view==='contato' && b.dataset.assunto===(sub||'__todos')));
    $$('#subnav-fin .sub-item').forEach(b=>b.classList.toggle('on', view==='financeiro' && b.dataset.fin===(sub||'geral')));
  }
  function irPara(view, sub){
    if(window.innerWidth<=860) abreSidebar(false);
    marcarAtivo(view, sub);
    if(view==='batismo')   renderBatismo();
    if(view==='membros')   renderMembros();
    if(view==='financeiro')renderFinanceiro(sub);
    if(view==='acao')      renderAcao(sub);
    if(view==='contato')   renderContatos(sub);
    if(view==='contribuicoes') renderContribuicoes();
  }

  const card=(rot,num,agua)=>'<div class="card"><div class="rot">'+rot+'</div><div class="num'+(agua?' agua':'')+'">'+num+'</div></div>';

  function renderBatismo(){
    $('#titulo').textContent='Inscrições de Batismo';
    const comp=BATISMO.filter(i=>i.camiseta_opcao==='comprar');
    const pagos=comp.filter(i=>i.pagamento_status==='aprovado').length;
    const brl=v=>'R$ '+v.toFixed(2).replace('.',',');
    let html='<div class="cards">'+
      card('Total de inscrições',BATISMO.length,true)+
      card('Comprando camiseta',comp.length)+
      card('Só no batismo',BATISMO.length-comp.length)+
      card('Camisetas · a receber',brl(comp.length*VALOR_CAMISETA))+
      card('Camisetas · recebido',brl(pagos*VALOR_CAMISETA))+
    '</div>';
    if(!BATISMO.length){ html+='<div class="tabela"><div class="vazio">Nenhuma inscrição ainda.</div></div>'; $('#view').innerHTML=html; return; }
    html+='<div class="tabela batismo"><div class="lin cab"><span>Nome</span><span>Célula</span><span>Telefone</span><span>Camiseta</span><span>Pagamento</span></div>';
    BATISMO.forEach(i=>{
      const pg=i.pagamento_status==='aprovado'?'<span class="pill ok">Pago</span>':i.pagamento_status==='pendente'?'<span class="pill pend">Pendente</span>':'<span class="pill na">—</span>';
      const cam=i.camiseta_opcao==='comprar'?('Comprar · '+esc(i.camiseta_numero)):(esc(i.camiseta_numero)+' (usar)');
      html+='<div class="lin"><span class="col" data-l="Nome">'+esc(i.nome)+'<span class="sub">'+dataBR(i.created_at)+'</span></span><span class="col" data-l="Célula">'+esc(i.celula)+'</span><span class="col" data-l="Telefone">'+esc(i.telefone)+'</span><span class="col" data-l="Camiseta">'+cam+'</span><span class="col" data-l="Pagamento">'+pg+'</span></div>';
    });
    html+='</div>';
    $('#view').innerHTML=html;
  }

  async function setAtivoMembro(id, ativo, cb){
    cb.disabled=true;
    const { error }=await sb.from('membros').update({ativo}).eq('id',id);
    cb.disabled=false;
    if(error){ cb.checked=!ativo; return; }
    const m=MEMBROS.find(x=>x.id===id); if(m) m.ativo=ativo;
    renderMembros();
  }
  const WA_SVG='<svg class="wa-ic" viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true"><path d="M17.5 14.4c-.3-.1-1.7-.8-1.9-.9-.3-.1-.5-.1-.7.1-.2.3-.7.9-.9 1.1-.2.2-.3.2-.6.1-.3-.1-1.2-.5-2.3-1.4-.9-.8-1.4-1.7-1.6-2-.2-.3 0-.5.1-.6.1-.1.3-.3.4-.5.1-.2.2-.3.3-.5.1-.2 0-.4 0-.5-.1-.1-.7-1.6-.9-2.2-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.4s1.1 2.8 1.2 3c.1.2 2.1 3.2 5 4.5.7.3 1.2.5 1.7.6.7.2 1.3.2 1.8.1.6-.1 1.7-.7 1.9-1.3.2-.7.2-1.2.2-1.3-.1-.2-.3-.2-.6-.4z"/><path d="M12 2a10 10 0 0 0-8.5 15.3L2 22l4.8-1.5A10 10 0 1 0 12 2zm0 18.2c-1.5 0-3-.4-4.3-1.2l-.3-.2-2.9.9.9-2.8-.2-.3A8.2 8.2 0 1 1 12 20.2z"/></svg>';
  function waNum(tel){ let d=(tel||'').replace(/\D/g,''); if(!d) return ''; if(d.length<=11) d='55'+d; return d; }
  function telWa(tel){ const n=waNum(tel); return n ? '<a class="tel-wpp" href="https://wa.me/'+n+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">'+WA_SVG+esc(tel)+'</a>' : ''; }
  function abreMembro(m){
    const peniel=m.passou_peniel===true?'Sim':m.passou_peniel===false?'Não':'—';
    const ativo=m.ativo!==false;
    const validado=m.validado===true;
    const iniciais=(m.nome||'?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
    const rua=[m.logradouro,m.numero].filter(Boolean).join(', ');
    const nasc=m.data_nascimento ? m.data_nascimento.split('-').reverse().join('/') : '';
    const telHtml = telWa(m.telefone) || null;
    const linhas=[
      ['Telefone', m.telefone, telHtml],
      ['CPF', m.cpf],
      ['Nascimento', nasc],
      ['Célula', m.celula],
      ['Ministério', m.ministerio || 'Não serve em nenhum'],
      ['Encontro Peniel', peniel],
      ['Endereço', rua],
      ['Complemento', m.complemento],
      ['Bairro', m.bairro],
      ['Cidade / UF', [m.cidade,m.uf].filter(Boolean).join(' / ')],
      ['CEP', m.cep]
    ];
    const fotoImg = m.foto_url
      ? '<img class="mb-foto" src="'+esc(m.foto_url)+'" alt="Foto de '+esc(m.nome)+'" onclick="window.open(this.src,\'_blank\')">'
      : '<div class="mb-foto mb-foto-ph">'+esc(iniciais)+'</div>';
    const foto = fotoImg+'<div class="mb-foto-acao"><input type="file" id="mbFotoFile" accept="image/*" style="display:none"><button class="mb-foto-btn" id="mbFotoBtn">'+(m.foto_url?'Trocar foto':'Adicionar foto')+'</button></div>';
    const valPill = validado ? '<span class="mb-pill ok">Validado</span>' : '<span class="mb-pill no">A validar</span>';
    $('#mbBody').innerHTML=
      '<h2><span class="mb-nome">'+esc(m.nome)+'</span><span class="mb-pill '+(ativo?'ok':'no')+'">'+(ativo?'Ativo':'Inativo')+'</span>'+valPill+'</h2>'+
      '<div class="msub">Cadastrado em '+dataBR(m.created_at)+'</div>'+
      foto+
      '<div class="det">'+linhas.map(l=>'<div class="det-lin"><span class="k">'+l[0]+'</span><span class="v">'+(l[2]||esc(l[1])||'—')+'</span></div>').join('')+'</div>'+
      '<div class="mb-acoes">'+(validado
        ? '<button class="btn-del" data-act="del">Excluir membro</button><button class="btn-val" data-act="cart">Criar carteirinha virtual</button>'
        : '<button class="btn-val" data-val="1">Validar dados / OK</button>')+'</div>';
    const vb=$('#mbBody .btn-val[data-val]');
    if(vb) vb.onclick=()=>setValidadoMembro(m.id, true);
    const bDel=$('#mbBody .btn-del'); if(bDel) bDel.onclick=()=>excluirMembro(m);
    const bCart=$('#mbBody [data-act="cart"]'); if(bCart) bCart.onclick=()=>abrirCarteirinha(m);
    const fBtn=$('#mbFotoBtn'), fFile=$('#mbFotoFile');
    if(fBtn && fFile){ fBtn.onclick=()=>fFile.click(); fFile.onchange=()=>{ const f=fFile.files&&fFile.files[0]; if(f) uploadFotoMembro(m,f); }; }
    $('#mbBg').classList.add('on');
  }
  async function uploadFotoMembro(m, file){
    if(!/^image\//.test(file.type)){ alert('Selecione uma imagem.'); return; }
    if(file.size>10*1024*1024){ alert('Imagem muito grande (máx 10MB).'); return; }
    const fBtn=$('#mbFotoBtn'); if(fBtn){ fBtn.disabled=true; fBtn.textContent='Enviando…'; }
    try{
      const ext=(file.name.split('.').pop()||'jpg').toLowerCase().replace(/[^a-z0-9]/g,'')||'jpg';
      const path='membros/'+Date.now()+'_'+Math.random().toString(36).slice(2,8)+'.'+ext;
      const up=await sb.storage.from('membros-fotos').upload(path, file, {upsert:false, contentType:file.type});
      if(up.error) throw up.error;
      const url=sb.storage.from('membros-fotos').getPublicUrl(path).data.publicUrl;
      const {error}=await sb.from('membros').update({foto_url:url}).eq('id',m.id);
      if(error) throw error;
      m.foto_url=url; const mm=MEMBROS.find(x=>x.id===m.id); if(mm) mm.foto_url=url;
      abreMembro(m);
    }catch(e){ if(fBtn){ fBtn.disabled=false; fBtn.textContent='Adicionar foto'; } alert('Não foi possível enviar a foto: '+(e.message||e)); }
  }
  async function setValidadoMembro(id, val){
    const vb=$('#mbBody .btn-val'); if(vb){ vb.disabled=true; vb.textContent='Salvando…'; }
    const {error}=await sb.from('membros').update({validado:val, validado_em: val?new Date().toISOString():null}).eq('id',id);
    if(error){ if(vb){ vb.disabled=false; } alert('Não foi possível salvar a validação: '+(error.message||error)); return; }
    const m=MEMBROS.find(x=>x.id===id);
    if(m){ m.validado=val; m.validado_em=val?new Date().toISOString():null; abreMembro(m); }
    if($('#titulo') && $('#titulo').textContent==='Membros') renderMembros();
  }
  async function excluirMembro(m){
    if(!confirm('Excluir o membro "'+(m.nome||'')+'"? Esta ação não pode ser desfeita.')) return;
    const bDel=$('#mbBody .btn-del'); if(bDel){ bDel.disabled=true; bDel.textContent='Excluindo…'; }
    const {error}=await sb.rpc('membro_excluir',{p_id:m.id});
    if(error){ if(bDel){ bDel.disabled=false; bDel.textContent='Excluir membro'; } alert('Não foi possível excluir: '+(error.message||error)); return; }
    MEMBROS=MEMBROS.filter(x=>x.id!==m.id);
    fechaMembro();
    if($('#titulo') && $('#titulo').textContent==='Membros') renderMembros();
  }
  function abrirCarteirinha(m){
    const logo=location.origin+'/assets/fonte-logo.png';
    const nome=esc(m.nome||'');
    const _p=(m.nome||'').trim().split(/\s+/); const nomeCurto=_p.length>1?esc(_p[0]+' '+_p[_p.length-1]):nome;
    const iniciais=(m.nome||'?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
    const nasc=m.data_nascimento ? m.data_nascimento.split('-').reverse().join('/') : '—';
    let desde='—'; try{ desde=m.created_at ? new Date(m.created_at).toLocaleDateString('pt-BR',{month:'long',year:'numeric'}) : '—'; }catch(e){}
    const cod='FONTE-'+String(m.id||'').replace(/-/g,'').slice(0,8).toUpperCase();
    let waNumber=(m.telefone||'').replace(/\D/g,''); if(waNumber && waNumber.length<=11) waNumber='55'+waNumber;
    const cat=(m.ministerio && m.ministerio!=='Não serve em nenhum') ? m.ministerio : 'MEMBRO';
    const serve=!!(m.ministerio && m.ministerio!=='Não serve em nenhum');
    const avCard=m.foto_url ? '<img class="av" crossorigin="anonymous" src="'+esc(m.foto_url)+'" alt="">' : '<div class="av ini">'+esc(iniciais)+'</div>';
    const avCracha=m.foto_url ? '<img class="cr-av" crossorigin="anonymous" src="'+esc(m.foto_url)+'" alt="">' : '<div class="cr-av ini">'+esc(iniciais)+'</div>';
    const rowsCartao=[['Célula',m.celula],['Ministério',m.ministerio||'Não serve em nenhum'],['Nascimento',nasc],['Membro desde',desde]]
      .map(l=>'<div class="row"><span>'+l[0]+'</span><b>'+(esc(l[1])||'—')+'</b></div>').join('');
    const rowsCracha=[['Célula',m.celula],['Membro desde',desde]]
      .map(l=>'<div class="row"><span>'+l[0]+'</span><b>'+(esc(l[1])||'—')+'</b></div>').join('');
    const doc=`<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Carteirinha · ${nome}</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"><\/script>

</style></head><body class="fmt-cartao">

  <div class="btns">

  </div>
  <script>
    var CARD={nome:${JSON.stringify(m.nome||'')}, wa:${JSON.stringify(waNumber)}, cod:${JSON.stringify(cod)}};
    function fillQR(){
      if(typeof QRCode==='undefined') return;
      var txt=location.origin+'/?membro='+encodeURIComponent(CARD.cod||'');
      QRCode.toDataURL(txt, {margin:1, width:220, color:{dark:'#0a0a0b', light:'#ffffff'}}, function(err,url){
        if(err) return;
        var a=document.getElementById('qr-cartao'); if(a) a.src=url;
        var b=document.getElementById('qr-cracha'); if(b) b.src=url;
      });
    }
    window.addEventListener('load', fillQR);
    function nomeArquivo(ext){
      var f=document.body.className.replace('fmt-','');
      var base=(f==='cracha')?'cracha':'carteirinha';
      var pr=((CARD.nome||'').trim().split(/\s+/)[0]||'membro').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');
      return base+'-'+(pr||'membro')+'.'+ext;
    }
    function setFmt(f){
      document.body.className='fmt-'+f;
      document.getElementById('fmt-cartao').classList.toggle('hidden', f!=='cartao');
      document.getElementById('fmt-cracha').classList.toggle('hidden', f!=='cracha');
      var tgs=document.querySelectorAll('.tg'); for(var i=0;i<tgs.length;i++){ tgs[i].classList.toggle('on', tgs[i].getAttribute('data-f')===f); }
      document.getElementById('pg').textContent = (f==='cartao') ? '@page{size:85.6mm 54mm;margin:0}' : '@page{size:110mm 150mm;margin:0}';
    }
    function ativo(){ return document.querySelector('.formato:not(.hidden)'); }
    function gerarPng(){
      if(typeof html2canvas==='undefined') return Promise.resolve(null);
      return html2canvas(ativo(),{backgroundColor:null,scale:3,useCORS:true})
        .then(function(cv){ return new Promise(function(res){ cv.toBlob(res,'image/png'); }); })
        .catch(function(){ return null; });
    }
    function gerarPdfBlob(){
      if(typeof html2canvas==='undefined') return Promise.resolve(null);
      var el=ativo(); el.classList.add('norad');
      var f=document.body.className.replace('fmt-',''); var sizes={cartao:[85.6,54], cracha:[110,150]}; var dim=sizes[f]||[85.6,54];
      return html2canvas(el,{scale:4,backgroundColor:null,useCORS:true}).then(function(cv){
        el.classList.remove('norad');
        var img=cv.toDataURL('image/png');
        var JsPDF=(window.jspdf&&window.jspdf.jsPDF)||window.jsPDF;
        var pdf=new JsPDF({orientation: dim[0]>dim[1]?'l':'p', unit:'mm', format:[dim[0],dim[1]]});
        pdf.addImage(img,'PNG',0,0,dim[0],dim[1]);
        return pdf.output('blob');
      }).catch(function(){ el.classList.remove('norad'); return null; });
    }
    function abrirWhats(texto){
      if(CARD.wa){ window.open('https://wa.me/'+CARD.wa+'?text='+encodeURIComponent(texto),'_blank'); }
      else { alert('Este membro não tem telefone cadastrado.'); }
    }
    function enviarWhats(){
      var texto='Olá'+(CARD.nome?(' '+CARD.nome):'')+'! Segue sua carteirinha de membro da Igreja Apostólica Fonte.';
      var btn=document.getElementById('sendBtn'); var t=btn.textContent;
      var isMobile=/Android|iPhone|iPad|iPod|Mobi/i.test(navigator.userAgent||'');
      if(isMobile && navigator.canShare){
        btn.disabled=true; btn.textContent='Gerando…';
        gerarPdfBlob().then(function(blob){
          var file=blob?new File([blob],nomeArquivo('pdf'),{type:'application/pdf'}):null;
          if(file && navigator.canShare({files:[file]})){
            navigator.share({files:[file], text:texto}).catch(function(){}).then(function(){ btn.disabled=false; btn.textContent=t; });
          } else { abrirWhats(texto); btn.disabled=false; btn.textContent=t; }
        });
      } else {
        abrirWhats(texto);
        btn.disabled=true; btn.textContent='Gerando PDF…';
        gerarPdfBlob().then(function(blob){
          if(blob){ var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=nomeArquivo('pdf'); a.click(); }
          btn.disabled=false; btn.textContent=t;
        });
      }
    }
    function baixarImg(){
      var btn=document.getElementById('dlBtn'); var t=btn.textContent; btn.disabled=true; btn.textContent='Gerando…';
      gerarPng().then(function(blob){
        if(blob){ var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=nomeArquivo('png'); a.click(); }
        else { alert('Não foi possível gerar a imagem.'); }
        btn.disabled=false; btn.textContent=t;
      });
    }
    function baixarPdf(){
      var btn=document.getElementById('pdfBtn'); var t=btn.textContent; btn.disabled=true; btn.textContent='Gerando…';
      var el=ativo(); el.classList.add('norad');
      var f=document.body.className.replace('fmt-','');
      var sizes={cartao:[85.6,54], cracha:[110,150]}; var dim=sizes[f]||[85.6,54];
      html2canvas(el,{scale:4,backgroundColor:null,useCORS:true}).then(function(cv){
        el.classList.remove('norad');
        try{
          var img=cv.toDataURL('image/png');
          var JsPDF=(window.jspdf&&window.jspdf.jsPDF)||window.jsPDF;
          var pdf=new JsPDF({orientation: dim[0]>dim[1]?'l':'p', unit:'mm', format:[dim[0],dim[1]]});
          pdf.addImage(img,'PNG',0,0,dim[0],dim[1]);
          pdf.save(nomeArquivo('pdf'));
        }catch(e){ alert('Não foi possível gerar o PDF: '+(e.message||e)); }
        btn.disabled=false; btn.textContent=t;
      }).catch(function(){ el.classList.remove('norad'); btn.disabled=false; btn.textContent=t; alert('Não foi possível gerar o PDF.'); });
    }
    var tgs=document.querySelectorAll('.tg');
    for(var i=0;i<tgs.length;i++){ tgs[i].addEventListener('click', function(){ setFmt(this.getAttribute('data-f')); }); }
    document.getElementById('sendBtn').addEventListener('click', enviarWhats);
    document.getElementById('dlBtn').addEventListener('click', baixarImg);
    document.getElementById('pdfBtn').addEventListener('click', baixarPdf);
  <\/script>
</body></html>`;

  function acoesContrib(c){

  function renderContribuicoes(){
    $('#titulo').textContent='Contribuições';
    const brl=v=>'R$ '+Number(v||0).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');

    });

    });
    $$('#view .sw input[data-aid]').forEach(cb=> cb.onchange=async()=>{
      const id=cb.dataset.aid; cb.disabled=true;
      const {error}=await sb.from('acao_itens').update({ativo:cb.checked}).eq('id',id); cb.disabled=false;
      if(error){ cb.checked=!cb.checked; return; }
      const it=AITENS.find(x=>x.id===id); if(it) it.ativo=cb.checked;
      cb.closest('.lin').classList.toggle('off',!cb.checked);
    });
    $$('#view .tabela.itens .lin[data-iid]').forEach(row=>{
      row.onclick=e=>{ if(e.target.closest('.stepper')||e.target.closest('.sw')) return; const it=AITENS.find(x=>x.id===row.dataset.iid); if(it) abreItem(it); };
    });
  }

  const norm = s => (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim().toLowerCase();
  const SECOES = {
    mercadinho:      { rot:'Mercadinho',       cats:['Alimento','Higiene','Limpeza','Bebida','Outros'], unis:['un','kg','g','L','ml','pacote','caixa','fardo'] },
    rouparia:        { rot:'Rouparia',         cats:['Roupa masculina','Roupa feminina','Roupa infantil','Calçado','Cama, mesa e banho','Acessório','Outros'], unis:['un','par','peça','kit'] },
    eletrodomesticos:{ rot:'Eletrodomésticos', cats:['Cozinha','Lavanderia','Climatização','Pequenos eletros','Outros'], unis:['un'] },
    moveis:          { rot:'Móveis',           cats:['Sala','Quarto','Cozinha','Escritório','Outros'], unis:['un'] },
    remedios:        { rot:'Remédios',         cats:['Analgésico','Antitérmico','Gripe e resfriado','Primeiros socorros','Outros'], unis:['un','caixa','cartela','frasco','ml'] }
  };
  const SEC_ORDER = ['mercadinho','rouparia','eletrodomesticos','moveis','remedios'];
  function inferSec(secao, categoria){
    var s=norm(secao||''); if(SECOES[s]) return s;
    var c=norm(categoria||''); if(SECOES[c] && c!=='mercadinho') return c;
    return 'mercadinho';
  }
  function optsHtml(list, sel){
    var has=false, out=list.map(function(x){ var on=norm(x)===norm(sel); if(on)has=true; return '<option'+(on?' selected':'')+'>'+esc(x)+'</option>'; }).join('');
    if(sel && !has) out='<option selected>'+esc(sel)+'</option>'+out;
    return out;
  }
  function abreItem(it){
    const e=it||{};
    var _sec = inferSec(e.secao, e.categoria), _S = SECOES[_sec];
    $('#itBody').innerHTML=
      '<h2>'+(it?'Editar item':'Novo item')+'</h2><div class="msub">Item da ação social</div>'+
      '<div class="fld"><label>Seção</label><select id="it-secao">'+SEC_ORDER.map(function(k){return '<option value="'+k+'"'+(k===_sec?' selected':'')+'>'+SECOES[k].rot+'</option>';}).join('')+'</select></div>'+
      '<div class="fld"><label>Nome</label><input id="it-nome" value="'+esc(e.nome||'')+'"></div>'+
      '<div class="f2"><div class="fld"><label>Categoria</label><select id="it-cat">'+optsHtml(_S.cats, e.categoria)+'</select></div>'+
        '<div class="fld"><label>Unidade</label><select id="it-uni">'+optsHtml(_S.unis, e.unidade||'un')+'</select></div></div>'+
      '<div class="f2"><div class="fld"><label>Quantidade em estoque</label><input id="it-qtd" type="number" min="0" value="'+(e.quantidade!=null?e.quantidade:0)+'"></div>'+
        '<div class="fld"><label>Prioridade no carrossel</label><input id="it-prio" type="number" min="0" value="'+(e.prioridade!=null?e.prioridade:0)+'"></div></div>'+
      '<div class="fld"><label>Limite por CPF · por mês</label><input id="it-lim" type="number" min="0" value="'+(e.limite_mensal_cpf!=null?e.limite_mensal_cpf:0)+'"><div class="ithint">0 = sem limite. Máximo que cada CPF pode reservar deste item por mês.</div></div>'+
      '<div class="fld"><label>Foto (URL)</label><input id="it-foto" placeholder="https://…" value="'+esc(e.foto_url||'')+'"></div>'+
      '<div class="fld" id="it-foto-upload" style="display:none"><label>Ou envie uma foto do item</label><input type="file" id="it-fotofile" accept="image/*"><div class="ithint" id="it-foto-status">A foto é enviada e o link acima é preenchido sozinho.</div></div>'+
      '<div class="fld"><label>Descrição</label><textarea id="it-desc" rows="2">'+esc(e.descricao||'')+'</textarea></div>'+
      '<label class="chkline"><input type="checkbox" id="it-nec"'+(e.necessidade?' checked':'')+'> Mostrar no carrossel “Estamos precisando de…”</label>'+
      '<div class="modal-actions"><button class="btn-primary" id="it-salvar">Salvar</button><button class="btn-ghost" id="it-cancelar">Cancelar</button>'+
        (it?'<button class="btn-danger" id="it-excluir">Excluir</button>':'')+'</div>';
    $('#itBg').classList.add('on');
    $('#it-cancelar').onclick=fechaItem;
    $('#it-salvar').onclick=()=>salvarItem(it&&it.id);
    function _podeSubirFoto(){ var sec=$('#it-secao').value, cat=norm($('#it-cat').value); return !(sec==='remedios' || cat==='alimento'); }
    function _atualizaUpload(){ var u=$('#it-foto-upload'); if(u) u.style.display=_podeSubirFoto()?'':'none'; }
    $('#it-secao').onchange=function(){ var s=SECOES[$('#it-secao').value]; $('#it-cat').innerHTML=optsHtml(s.cats, s.cats[0]); $('#it-uni').innerHTML=optsHtml(s.unis, s.unis[0]); _atualizaUpload(); };
    $('#it-cat').addEventListener('change', _atualizaUpload);
    _atualizaUpload();
    var _ff=$('#it-fotofile'); if(_ff) _ff.onchange=async function(){
      var f=this.files&&this.files[0]; if(!f) return;
      var st=$('#it-foto-status');
      if(f.size > 10*1024*1024){ st.textContent='Foto muito grande (máx. 10MB). Tente uma menor.'; this.value=''; return; }
      st.textContent='Enviando foto…';
      try{
        var ext=((f.name.split('.').pop()||'jpg').toLowerCase().replace(/[^a-z0-9]/g,''))||'jpg';
        var path='itens/'+Date.now()+'_'+Math.random().toString(36).slice(2,8)+'.'+ext;
        var up=await sb.storage.from('acao-fotos').upload(path,f,{contentType:f.type||'image/jpeg',upsert:false});
        if(up.error) throw up.error;
        var pub=sb.storage.from('acao-fotos').getPublicUrl(path);
        $('#it-foto').value=pub.data.publicUrl;
        st.textContent='Foto enviada. Link preenchido acima.';
      }catch(err){ st.textContent='Não deu para enviar: '+(err.message||err); }
    };
    if(it) $('#it-excluir').onclick=()=>excluirItem(it.id);
  }
  function fechaItem(){ $('#itBg').classList.remove('on'); }
  async function salvarItem(id){
    const v=i=>{const el=$('#'+i);return el?el.value.trim():'';};
    const nome=v('it-nome'); if(!nome){ alert('Informe o nome do item.'); return; }
    const payload={ nome, secao:$('#it-secao').value, categoria:v('it-cat')||null, unidade:v('it-uni')||'un',
      quantidade:Math.max(0,parseInt($('#it-qtd').value,10)||0),
      prioridade:Math.max(0,parseInt($('#it-prio').value,10)||0),
      limite_mensal_cpf:Math.max(0,parseInt($('#it-lim').value,10)||0),
      foto_url:v('it-foto')||null, descricao:v('it-desc')||null, necessidade:$('#it-nec').checked };
    const btn=$('#it-salvar'); btn.disabled=true; btn.textContent='Salvando…';
    let error;
    if(id){ ({error}=await sb.from('acao_itens').update(payload).eq('id',id)); }
    else  { ({error}=await sb.from('acao_itens').insert(payload)); }
    btn.disabled=false; btn.textContent='Salvar';
    if(error){ alert('Erro ao salvar: '+error.message); return; }
    await reloadItens(); fechaItem(); renderAcao(acaoTab);
  }
  async function excluirItem(id){
    if(!confirm('Excluir este item? As reservas antigas mantêm o histórico.')) return;
    const {error}=await sb.from('acao_itens').delete().eq('id',id);
    if(error){ alert('Erro ao excluir: '+error.message); return; }
    await reloadItens(); fechaItem(); renderAcao(acaoTab);
  }

  function renderAcaoNec(){
    $('#titulo').textContent='Ação Social · Necessidades';
    const necs=AITENS.filter(i=>i.necessidade).slice().sort((a,b)=> (b.prioridade-a.prioridade) || a.nome.localeCompare(b.nome,'pt'));
    let html='<p class="view-sub">Itens marcados aqui aparecem no carrossel “Estamos precisando de…” do site. Prioridade maior aparece primeiro.</p>';
    if(!necs.length){ html+='<div class="tabela"><div class="vazio">Nenhum item no carrossel. Marque “necessidade” ao cadastrar/editar um item no Estoque.</div></div>'; $('#view').innerHTML=html; return; }
    html+='<div class="tabela itens"><div class="lin cab"><span>Item</span><span>Prioridade</span><span></span></div>';
    necs.forEach(i=>{
      const falta=i.quantidade<=0;
      html+='<div class="lin" data-iid="'+i.id+'">'+
        '<span class="col" data-l="Item">'+esc(i.nome)+(falta?'<span class="tag-nec" style="background:rgba(248,113,113,.15);color:#f87171">em falta</span>':'')+'<span class="sub">'+(esc(i.categoria)||'—')+'</span></span>'+
        '<span class="col" data-l="Prioridade"><span class="stepper" data-pid="'+i.id+'"><button data-d="-1">−</button><span class="q">'+i.prioridade+'</span><button data-d="1">+</button></span></span>'+
        '<span class="col"><button class="mini-btn warn" data-off="'+i.id+'">Tirar do carrossel</button></span>'+
        '</div>';
    });
    html+='</div>';
    $('#view').innerHTML=html;
    $$('#view .stepper[data-pid]').forEach(st=>{
      st.querySelectorAll('button').forEach(b=> b.onclick=async()=>{
        const id=st.dataset.pid, it=AITENS.find(x=>x.id===id); if(!it) return;
        const novo=Math.max(0, it.prioridade+parseInt(b.dataset.d,10));
        b.disabled=true; const {error}=await sb.from('acao_itens').update({prioridade:novo}).eq('id',id); b.disabled=false;
        if(!error){ it.prioridade=novo; renderAcaoNec(); }
      });
    });
    $$('#view .mini-btn[data-off]').forEach(b=> b.onclick=async()=>{
      const id=b.dataset.off; b.disabled=true;
      const {error}=await sb.from('acao_itens').update({necessidade:false}).eq('id',id);
      if(error){ b.disabled=false; return; }
      const it=AITENS.find(x=>x.id===id); if(it) it.necessidade=false; renderAcaoNec();
    });
  }

  function renderAcaoReservas(){
    $('#titulo').textContent='Ação Social · Reservas';
    const cont=s=>ARES.filter(r=>r.status===s).length;
    const tabs=[['pendente','Pendentes'],['separado','Separados'],['entregue','Entregues'],['cancelado','Cancelados'],['todas','Todas']];
    let html='<div class="subtabs">'+tabs.map(t=>'<button class="subtab'+(acaoResTab===t[0]?' on':'')+'" data-tab="'+t[0]+'">'+t[1]+(t[0]!=='todas'?' ('+cont(t[0])+')':'')+'</button>').join('')+'</div>';
    const lista=acaoResTab==='todas'?ARES:ARES.filter(r=>r.status===acaoResTab);
    if(!lista.length){ html+='<div class="tabela"><div class="vazio">Nenhuma reserva nesta aba.</div></div>'; }
    else lista.forEach(r=>{
      const itens=(r.acao_reserva_itens||[]);
      const pill=r.status==='pendente'?'aviso':r.status==='separado'?'mar':r.status==='entregue'?'ok':'off2';
      const wa=waLink(r.membro_telefone);
      html+='<div class="res-card">'+
        '<div class="res-head"><div><div style="font-weight:600">'+esc(r.membro_nome||'—')+' <span class="res-pill '+pill+'">'+r.status+'</span></div>'+
          '<div class="sub2">'+cpfFmt(r.membro_cpf)+' · '+(esc(r.membro_telefone)||'sem telefone')+' · '+dataBR(r.created_at)+' · '+(r.eh_membro?'membro':'pré-membro')+'</div></div>'+
          (wa?'<a class="mini-btn go" href="'+wa+'" target="_blank" rel="noopener">WhatsApp</a>':'')+'</div>'+
        '<div class="res-itens">'+(itens.length?itens.map(li=>'<div class="li"><span>'+esc(li.item_nome)+'</span><span>x'+li.quantidade+'</span></div>').join(''):'<div class="li">—</div>')+'</div>'+
        (r.obs?'<div class="sub2" style="margin-bottom:10px">Obs: '+esc(r.obs)+'</div>':'')+
        '<div class="res-actions">'+acoesReserva(r)+'</div>'+
        '</div>';
    });
    $('#view').innerHTML=html;
    $$('#view .subtab').forEach(b=> b.onclick=()=>{ acaoResTab=b.dataset.tab; renderAcaoReservas(); });
    $$('#view .mini-btn[data-st]').forEach(b=> b.onclick=()=>mudaStatus(b.dataset.rid, b.dataset.st));
  }
  function acoesReserva(r){
    const btn=(st,txt,cls)=>'<button class="mini-btn '+cls+'" data-rid="'+r.id+'" data-st="'+st+'">'+txt+'</button>';
    if(r.status==='pendente') return btn('separado','Marcar separado','go')+btn('cancelado','Cancelar','warn');
    if(r.status==='separado') return btn('entregue','Marcar entregue','go')+btn('cancelado','Cancelar','warn');
    return '<span class="sub2">Sem ações</span>';
  }
  async function mudaStatus(id, st){
    if(st==='cancelado' && !confirm('Cancelar esta reserva? O estoque reservado será devolvido.')) return;
    const {error}=await sb.rpc('acao_reserva_set_status',{p_id:id, p_status:st});
    if(error){ alert('Erro: '+error.message); return; }
    await Promise.all([reloadReservas(), reloadItens()]);
    renderAcaoReservas();
  }

  async function reloadPessoas(){ const {data}=await sb.from('acao_pessoas').select('*').order('created_at',{ascending:false}); APESSOAS=data||[]; }
  async function reloadMembros(){ const {data}=await sb.from('membros').select('id,nome,cpf,celula,telefone,ministerio,passou_peniel,cep,logradouro,numero,complemento,bairro,cidade,uf,ativo,created_at,data_nascimento,foto_url,validado,validado_em').order('created_at',{ascending:false}); MEMBROS=data||[]; }

  function renderAcaoPessoas(){
    $('#titulo').textContent='Ação Social · Pessoas';
    const total=APESSOAS.length, promo=APESSOAS.filter(p=>p.promovido).length;
    let html='<p class="view-sub">Pessoas atendidas que chegaram pela ação social. Se ainda não são membros, você pode promover a membro quando fizer sentido.</p>';
    html+='<div class="cards">'+card('Pré-membros',total,true)+card('Promovidos a membro',promo)+'</div>';
    if(!APESSOAS.length){ html+='<div class="tabela"><div class="vazio">Ninguém por aqui ainda. As pessoas aparecem quando fazem a primeira reserva.</div></div>'; $('#view').innerHTML=html; return; }
    html+='<div class="tabela pessoas"><div class="lin cab"><span>Nome</span><span>CPF</span><span>Telefone</span><span></span></div>';
    APESSOAS.forEach(p=>{
      const wa=waLink(p.telefone);
      const acao = p.promovido
        ? '<span class="sub2">já é membro</span>'
        : '<button class="mini-btn go" data-promo="'+p.id+'">Promover a membro</button>';
      html+='<div class="lin">'+
        '<span class="col" data-l="Nome">'+esc(p.nome)+(p.promovido?'<span class="tag-nec">membro</span>':'')+'<span class="sub">'+(esc(p.celula)||'—')+' · '+dataBR(p.created_at)+'</span></span>'+
        '<span class="col" data-l="CPF">'+cpfFmt(p.cpf)+'</span>'+
        '<span class="col" data-l="Telefone">'+(wa?'<a class="mini-btn go" href="'+wa+'" target="_blank" rel="noopener">'+esc(p.telefone)+'</a>':(esc(p.telefone)||'—'))+'</span>'+
        '<span class="col">'+acao+'</span>'+
        '</div>';
    });
    html+='</div>';
    $('#view').innerHTML=html;
    $$('#view .mini-btn[data-promo]').forEach(b=> b.onclick=()=>promoverPessoa(b.dataset.promo));
  }
  async function promoverPessoa(id){
    if(!confirm('Promover esta pessoa a membro? Ela será salva no cadastro de membros.')) return;
    const { error } = await sb.rpc('acao_promover_pessoa', { p_id:id });
    if(error){ alert('Erro: '+error.message); return; }
    await Promise.all([reloadPessoas(), reloadMembros()]);
    renderAcaoPessoas();
  }
  $('#btn-fin').onclick=function(){
    if(app.classList.contains('recolhido')) setRecolhido(false);
    const abre=!$('#subnav-fin').classList.contains('aberto');
    $('#subnav-fin').classList.toggle('aberto',abre);
    this.classList.toggle('aberto',abre);
    if(abre) irPara('financeiro','geral');
  };
  $$('#subnav-fin .sub-item').forEach(b=> b.onclick=()=>irPara('financeiro', b.dataset.fin));
  $('#btn-acao').onclick=function(){
    if(app.classList.contains('recolhido')) setRecolhido(false);
    const abre=!$('#subnav-acao').classList.contains('aberto');
    $('#subnav-acao').classList.toggle('aberto',abre);
    this.classList.toggle('aberto',abre);
    if(abre) irPara('acao','estoque');
  };
  $$('#subnav-acao .sub-item').forEach(b=> b.onclick=()=>irPara('acao', b.dataset.acao));
  $('#sair').onclick=async()=>{ await sb.auth.signOut(); location.replace('login.html'); };
  $('#mbX').onclick=fechaMembro;
  $('#mbBg').onclick=e=>{ if(e.target===$('#mbBg')) fechaMembro(); };
  $('#itX').onclick=fechaItem;
  $('#itBg').onclick=e=>{ if(e.target===$('#itBg')) fechaItem(); };
  document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ fechaMembro(); fechaItem(); } });

  (async function(){
    const { data:{ user } } = await sb.auth.getUser();
    if(!user){ location.replace('login.html'); return; }
    const { data:perfil } = await sb.from('profiles').select('role').eq('id',user.id).single();
    if(!perfil || perfil.role!=='admin'){
      $('#view').innerHTML='<div class="vazio">Sua conta não tem acesso de administrador.</div>';
      await sb.auth.signOut(); setTimeout(()=>location.replace('login.html'),1800); return;
    }
    $('#quem').textContent=user.email;
    const [rb, rc, rm, ai, ar, ap, co] = await Promise.all([
      sb.from('inscricoes_batismo').select('nome,celula,telefone,camiseta_numero,camiseta_opcao,pagamento_status,created_at').order('created_at',{ascending:false}),
      sb.from('contatos').select('nome,telefone,email,assunto,mensagem,created_at').order('created_at',{ascending:false}),
      sb.from('membros').select('id,nome,cpf,celula,telefone,ministerio,passou_peniel,cep,logradouro,numero,complemento,bairro,cidade,uf,ativo,created_at,data_nascimento,foto_url,validado,validado_em').order('created_at',{ascending:false}),
      sb.from('acao_itens').select('*').order('nome'),
      sb.from('acao_reservas').select('*, acao_reserva_itens(*)').order('created_at',{ascending:false}),
      sb.from('acao_pessoas').select('*').order('created_at',{ascending:false}),
      sb.from('contribuicoes').select('*').order('created_at',{ascending:false})
    ]);
    BATISMO = rb.data || [];
    CONTATOS = rc.data || [];
    MEMBROS = rm.data || [];
    AITENS = ai.data || [];
    ARES = ar.data || [];
    APESSOAS = ap.data || [];
    CONTRIB = co.data || [];
    montaSubnav();
    irPara('batismo');
  })();
</script>
