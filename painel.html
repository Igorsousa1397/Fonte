<!--
  IGREJA FONTE · Cajamar — Painel administrativo
  Protegido: exige sessão + role='admin'. Lê inscrições/membros via RLS.
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Painel · Igreja Fonte</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --abismo:#0a0a0b; --breu:#101013; --grafite:#17171b; --grafite-2:#1f1f25;
    --neblina:#2a2a31; --cinza:#8b8b95; --cinza-claro:#b8b8c0; --luz:#f5f5f6;
    --agua:#7ad4cf; --agua-forte:#4bb6b0; --agua-fundo:rgba(122,212,207,.10);
    --ok:#4ade80; --alerta:#f87171; --aviso:#fbbf24;
    --display:"Bricolage Grotesque",system-ui,sans-serif; --corpo:"Inter",system-ui,sans-serif;
    --raio:16px; --raio-sm:11px; --borda:1px solid var(--neblina);
    --logo:url('assets/fonte-logo.png');
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--abismo);color:var(--luz);font-family:var(--corpo);line-height:1.6;
       -webkit-font-smoothing:antialiased;min-height:100vh}
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--agua);color:#04201f}
  .wrap{max-width:1080px;margin:0 auto;padding:0 22px}

  header{position:sticky;top:0;z-index:20;background:rgba(10,10,11,.8);backdrop-filter:blur(14px);border-bottom:var(--borda)}
  .nav{display:flex;align-items:center;justify-content:space-between;height:64px;max-width:1080px;margin:0 auto;padding:0 22px}
  .marca-logo{background:var(--logo) center/contain no-repeat;width:96px;height:46px}
  .sair{display:inline-flex;align-items:center;gap:8px;border:var(--borda);border-radius:100px;
        padding:8px 16px;font-size:.88rem;color:var(--cinza-claro);cursor:pointer;background:none;font-family:var(--corpo)}
  .sair:hover{border-color:var(--cinza);color:var(--luz)}

  main{padding:38px 0 70px}
  .eyebrow{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--cinza);font-weight:600}
  h1{font-family:var(--display);font-weight:800;font-size:2rem;letter-spacing:-.02em;margin:6px 0 2px}
  .quem{color:var(--cinza-claro);font-size:.95rem;margin-bottom:26px}

  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:30px}
  .card{border:var(--borda);border-radius:var(--raio);background:var(--grafite);padding:18px 20px}
  .card .rot{font-size:.82rem;color:var(--cinza)}
  .card .num{font-family:var(--display);font-weight:700;font-size:2rem;line-height:1.1;margin-top:4px}
  .card .num.agua{color:var(--agua)}

  .sec-tit{font-family:var(--display);font-weight:700;font-size:1.2rem;margin:26px 0 12px;display:flex;
           align-items:center;justify-content:space-between;gap:12px}
  .tabela{border:var(--borda);border-radius:var(--raio);overflow:hidden;background:var(--grafite)}
  .tabela .lin{display:grid;grid-template-columns:1.4fr 1fr .9fr .8fr .9fr;gap:10px;padding:12px 16px;
               border-bottom:1px solid rgba(42,42,49,.6);font-size:.9rem;align-items:center}
  .tabela .lin:last-child{border-bottom:none}
  .tabela .cab{background:var(--breu);color:var(--cinza);font-size:.76rem;letter-spacing:.06em;text-transform:uppercase;font-weight:600}
  .tabela .lin .sub{display:block;color:var(--cinza);font-size:.8rem}
  .pill{display:inline-block;padding:3px 10px;border-radius:100px;font-size:.76rem;font-weight:600}
  .pill.ok{background:rgba(74,222,128,.14);color:var(--ok)}
  .pill.pend{background:rgba(251,191,36,.14);color:var(--aviso)}
  .pill.na{background:rgba(139,139,149,.14);color:var(--cinza-claro)}
  .vazio{padding:26px 16px;text-align:center;color:var(--cinza);font-size:.9rem}
  .carregando{padding:26px 16px;text-align:center;color:var(--cinza);font-size:.9rem}
  @media(max-width:680px){
    .tabela .lin{grid-template-columns:1fr;gap:2px}
    .tabela .cab{display:none}
    .tabela .lin{padding:14px 16px}
    .tabela .lin .col::before{content:attr(data-l);color:var(--cinza);font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;margin-right:6px}
  }
</style>

<header>
  <div class="nav">
    <span class="marca-logo" role="img" aria-label="Igreja Fonte"></span>
    <button class="sair" id="sair"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3M11 11l3-3-3-3M14 8H6"/></svg> Sair</button>
  </div>
</header>

<main class="wrap">
  <span class="eyebrow">Painel</span>
  <h1>Administração</h1>
  <p class="quem" id="quem">Verificando acesso…</p>

  <div id="conteudo" style="display:none">
    <div class="cards">
      <div class="card"><div class="rot">Inscrições · Batismo</div><div class="num agua" id="c-batismo">—</div></div>
      <div class="card"><div class="rot">Comprando camiseta</div><div class="num" id="c-camiseta">—</div></div>
      <div class="card"><div class="rot">Membros</div><div class="num" id="c-membros">—</div></div>
    </div>

    <div class="sec-tit">Inscrições de Batismo <span style="font-size:.82rem;color:var(--cinza);font-weight:400" id="sub-batismo"></span></div>
    <div class="tabela" id="tab-batismo">
      <div class="lin cab"><span>Nome</span><span>Célula</span><span>Telefone</span><span>Camiseta</span><span>Pagamento</span></div>
      <div class="carregando">Carregando…</div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/supabase.js"></script>
<script>
  const $=id=>document.getElementById(id);
  const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const dataBR=iso=>{ if(!iso) return ''; const d=new Date(iso); return d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); };

  (async function(){
    // 1) exige sessão
    const { data:{ user } } = await sb.auth.getUser();
    if(!user){ location.replace('login.html'); return; }

    // 2) exige role = admin
    const { data:perfil } = await sb.from('profiles').select('role').eq('id', user.id).single();
    if(!perfil || perfil.role!=='admin'){
      $('quem').textContent='Sua conta não tem acesso de administrador.';
      await sb.auth.signOut();
      setTimeout(()=>location.replace('login.html'), 1800);
      return;
    }

    $('quem').textContent = 'Logado como ' + user.email;
    $('conteudo').style.display='block';

    // 3) carrega inscrições de batismo
    const { data:insc, error } = await sb
      .from('inscricoes_batismo')
      .select('nome,celula,telefone,camiseta_numero,camiseta_opcao,pagamento_status,created_at')
      .order('created_at',{ascending:false});

    const tab=$('tab-batismo');
    if(error){ tab.querySelector('.carregando').textContent='Erro ao carregar: '+error.message; return; }

    $('c-batismo').textContent = insc.length;
    $('c-camiseta').textContent = insc.filter(i=>i.camiseta_opcao==='comprar').length;
    $('sub-batismo').textContent = insc.length ? '('+insc.length+')' : '';

    // conta de membros (pode dar 0)
    const { count:qtdMembros } = await sb.from('membros').select('*',{count:'exact',head:true});
    $('c-membros').textContent = qtdMembros ?? 0;

    const cab = tab.querySelector('.cab');
    tab.innerHTML=''; tab.appendChild(cab);
    if(!insc.length){
      const v=document.createElement('div'); v.className='vazio'; v.textContent='Nenhuma inscrição ainda.'; tab.appendChild(v); return;
    }
    insc.forEach(i=>{
      const pg = i.pagamento_status==='aprovado' ? '<span class="pill ok">Pago</span>'
               : i.pagamento_status==='pendente' ? '<span class="pill pend">Pendente</span>'
               : '<span class="pill na">—</span>';
      const cam = i.camiseta_opcao==='comprar' ? 'Comprar · '+esc(i.camiseta_numero) : esc(i.camiseta_numero)+' (usar)';
      const el=document.createElement('div'); el.className='lin';
      el.innerHTML =
        '<span class="col" data-l="Nome">'+esc(i.nome)+'<span class="sub">'+dataBR(i.created_at)+'</span></span>'+
        '<span class="col" data-l="Célula">'+esc(i.celula)+'</span>'+
        '<span class="col" data-l="Telefone">'+esc(i.telefone)+'</span>'+
        '<span class="col" data-l="Camiseta">'+cam+'</span>'+
        '<span class="col" data-l="Pagamento">'+pg+'</span>';
      tab.appendChild(el);
    });
  })();

  $('sair').onclick=async()=>{ await sb.auth.signOut(); location.replace('login.html'); };
</script>
