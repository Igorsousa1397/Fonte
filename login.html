<!--
  IGREJA FONTE · Cajamar — Login administrativo
  Tela visual. O backend (autenticação) será adicionado depois.
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login · Área do administrador · Igreja Fonte</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --abismo:#0a0a0b; --breu:#101013; --grafite:#17171b; --neblina:#2a2a31;
    --cinza:#8b8b95; --cinza-claro:#b8b8c0; --luz:#f5f5f6;
    --agua:#7ad4cf; --agua-forte:#4bb6b0; --agua-fundo:rgba(122,212,207,.10);
    --display:"Bricolage Grotesque", system-ui, sans-serif;
    --corpo:"Inter", system-ui, sans-serif;
    --raio:16px; --raio-sm:11px; --borda:1px solid var(--neblina);
    --logo:url('assets/fonte-logo.png');
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--abismo);color:var(--luz);font-family:var(--corpo);line-height:1.6;
       -webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--agua);color:#04201f}

  /* brilho de fundo sutil */
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(60% 45% at 50% 0%, rgba(122,212,207,.08), transparent 70%)}

  .topo{position:absolute;top:0;left:0;right:0;z-index:2;padding:22px}
  .voltar{display:inline-flex;align-items:center;gap:8px;font-size:.9rem;color:var(--cinza-claro);font-weight:500}
  .voltar:hover{color:var(--luz)}

  main{position:relative;z-index:1;flex:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
  .card{width:100%;max-width:400px;border:var(--borda);border-radius:var(--raio);background:var(--grafite);
        padding:38px 30px;box-shadow:0 30px 70px -30px #000}
  .marca-logo{background:var(--logo) center/contain no-repeat;width:132px;height:66px;margin:0 auto 26px}
  .card h1{font-family:var(--display);font-weight:700;font-size:1.5rem;text-align:center;letter-spacing:-.02em}
  .card .sub{text-align:center;color:var(--cinza);font-size:.9rem;margin:6px 0 26px}

  .campo{margin-bottom:16px}
  .campo label{display:block;font-size:.85rem;color:var(--cinza-claro);margin-bottom:8px;font-weight:500}
  .campo input{width:100%;background:var(--breu);border:var(--borda);border-radius:var(--raio-sm);
     padding:13px 15px;color:var(--luz);font-family:var(--corpo);font-size:.98rem;transition:border-color .2s}
  .campo input:focus{outline:none;border-color:var(--agua-forte)}
  .campo input::placeholder{color:var(--cinza)}

  .btn{width:100%;font-weight:600;font-size:1rem;padding:14px 20px;border-radius:100px;cursor:pointer;
       border:none;background:var(--luz);color:#0a0a0b;margin-top:8px;transition:transform .15s,background .2s}
  .btn:hover{background:#fff}
  .btn:active{transform:translateY(1px)}

  .nota{margin-top:20px;text-align:center;font-size:.78rem;color:var(--cinza);
        border-top:var(--borda);padding-top:16px}
  .nota .selo{display:inline-flex;align-items:center;gap:7px;color:var(--agua);font-weight:600}
  .nota .selo .dot{width:6px;height:6px;border-radius:50%;background:var(--agua);box-shadow:0 0 0 4px var(--agua-fundo)}

  .toast{position:fixed;left:50%;bottom:26px;transform:translate(-50%,20px);background:var(--grafite);
     border:1px solid var(--agua-forte);color:var(--luz);padding:12px 18px;border-radius:100px;font-size:.9rem;
     opacity:0;pointer-events:none;transition:all .3s;z-index:50}
  .toast.on{opacity:1;transform:translate(-50%,0)}
</style>

<div class="topo">
  <a class="voltar" href="index.html"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4l-6 5 6 5"/></svg> Voltar ao site</a>
</div>

<main>
  <span class="marca-logo" role="img" aria-label="Igreja Fonte"></span>
  <div class="card">
    <h1>Área do administrador</h1>
    <p class="sub">Acesso restrito à equipe da Fonte.</p>

    <div class="campo">
      <label for="email">E-mail</label>
      <input id="email" type="email" autocomplete="username" placeholder="voce@fonte.com">
    </div>
    <div class="campo">
      <label for="senha">Senha</label>
      <input id="senha" type="password" autocomplete="current-password" placeholder="••••••••">
    </div>

    <button class="btn" id="entrar">Entrar</button>

  </div>
</main>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/supabase.js"></script>
<script>
  function toast(msg){
    var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('on');
    clearTimeout(t._t); t._t=setTimeout(function(){t.classList.remove('on');},2800);
  }

  // Se já estiver logado, vai direto pro painel
  sb.auth.getSession().then(function(r){ if(r.data.session) location.replace('painel.html'); });

  var emailEl=document.getElementById('email'),
      senhaEl=document.getElementById('senha'),
      btn=document.getElementById('entrar');

  async function entrar(){
    var email=emailEl.value.trim(), senha=senhaEl.value;
    if(!email||!senha){ toast('Preencha e-mail e senha.'); return; }
    btn.disabled=true; var label=btn.textContent; btn.textContent='Entrando…';
    var res=await sb.auth.signInWithPassword({ email:email, password:senha });
    if(res.error){
      btn.disabled=false; btn.textContent=label;
      toast(/invalid|credentials/i.test(res.error.message) ? 'E-mail ou senha inválidos.' : res.error.message);
      return;
    }
    location.replace('painel.html');
  }

  btn.onclick=entrar;
  senhaEl.addEventListener('keydown', function(e){ if(e.key==='Enter') entrar(); });
  emailEl.addEventListener('keydown', function(e){ if(e.key==='Enter') senhaEl.focus(); });
</script>
