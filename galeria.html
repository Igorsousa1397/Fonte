<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fotos dos cultos · Igreja Fonte</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --abismo:#0a0a0b; --grafite:#17171b; --neblina:#2a2a31; --cinza:#8b8b95; --cinza-claro:#b8b8c0; --luz:#f5f5f6;
    --agua:#7ad4cf; --agua-forte:#4bb6b0;
    --display:"Bricolage Grotesque", system-ui, sans-serif;
    --corpo:"Inter", system-ui, sans-serif;
    --borda:1px solid var(--neblina);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--abismo);color:var(--luz);font-family:var(--corpo);line-height:1.7;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  img{display:block;max-width:100%}
  .top{position:sticky;top:0;z-index:20;background:rgba(10,10,11,.82);backdrop-filter:blur(10px);border-bottom:var(--borda)}
  .top-in{max-width:1280px;margin:0 auto;padding:16px 22px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:16px}
  .top-in>*{grid-row:1}
  .logo{width:104px;height:40px;background:url('assets/fonte-logo.png') center/contain no-repeat;display:block;grid-column:2;justify-self:center}
  .voltar{color:var(--cinza);font-size:.9rem;transition:color .2s;grid-column:1;justify-self:start}
  .voltar:hover{color:var(--luz)}

  .wrap{max-width:1280px;margin:0 auto;padding:52px 22px 40px}
  .intro{display:flex;flex-wrap:wrap;align-items:end;justify-content:space-between;gap:20px;margin-bottom:30px}
  .intro .txt{max-width:56ch}
  .eyebrow{font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--cinza);font-weight:600}
  .intro h1{font-family:var(--display);font-weight:700;font-size:clamp(2rem,5vw,3rem);line-height:1.02;margin:8px 0}
  .intro p{color:var(--cinza-claro)}
  .btn-drive{display:inline-flex;align-items:center;gap:8px;background:var(--agua);color:#04201f;white-space:nowrap;
             font-weight:600;padding:13px 24px;border-radius:100px;transition:transform .15s,background .2s}
  .btn-drive:hover{background:var(--agua-forte);transform:translateY(-1px)}

  /* mosaico — colunas mantendo a proporção original das fotos */
  .mosaico{column-count:3;column-gap:14px}
  .mosaico a{display:block;margin:0 0 14px;border-radius:14px;overflow:hidden;break-inside:avoid;background:var(--grafite);position:relative}
  .mosaico img{width:100%;transition:transform .5s,opacity .3s;opacity:.96}
  .mosaico a:hover img{transform:scale(1.03);opacity:1}
  .mosaico a:focus-visible{outline:2px solid var(--agua);outline-offset:2px}

  .foot-base{max-width:1280px;margin:44px auto 0;padding:22px;border-top:var(--borda);display:flex;
             justify-content:space-between;gap:16px;flex-wrap:wrap;color:var(--cinza);font-size:.82rem}
  .foot-base .dev-cred{color:var(--agua)}
  .foot-legais{display:flex;gap:20px;flex-wrap:wrap}
  .foot-legais a{color:var(--cinza);transition:color .2s}
  .foot-legais a:hover{color:var(--luz)}

  @media(max-width:900px){ .mosaico{column-count:2} }
  @media(max-width:560px){ .mosaico{column-count:1;column-gap:0} }
</style>
</head>
<body>
  <header class="top">
    <div class="top-in">
      <a class="logo" href="index.html" aria-label="Igreja Fonte — início"></a>
      <a class="voltar" href="index.html">← Voltar ao site</a>
    </div>
  </header>

  <main class="wrap">
    <div class="intro">
      <div class="txt">
        <span class="eyebrow">Galeria</span>
        <h1>Momentos na Fonte</h1>
        <p>Uma seleção dos nossos cultos. Veja o álbum completo, com todas as fotos, no nosso Drive.</p>
      </div>
      <a class="btn-drive" id="btnDrive" href="#" target="_blank" rel="noopener">Ver álbum completo no Drive ↗</a>
    </div>

    <div class="mosaico" id="mosaico"></div>
  </main>

  <footer class="foot-base">
    <span>© 2026 Igreja Apostólica Fonte · Desenvolvido por <span class="dev-cred">iOS Tech</span></span>
    <span class="foot-legais">
      <a href="politica-de-privacidade.html">Política de Privacidade</a>
      <a href="condicoes.html">Condições e suporte</a>
      <a href="index.html">Voltar ao início</a>
    </span>
  </footer>

<script>
/* ======================================================================
   CONFIG — edite só esta parte
   1) ALBUM_DRIVE: cole o link da pasta compartilhada do Google Drive.
   2) FOTOS: liste as fotos (arquivos em assets/galeria/).
   ====================================================================== */
const ALBUM_DRIVE = "#"; // ex.: "https://drive.google.com/drive/folders/SEU_ID"

const FOTOS = [
  'assets/galeria/culto-1.jpg',
  'assets/galeria/culto-2.jpg',
  'assets/galeria/culto-3.jpg',
  'assets/galeria/culto-4.jpg',
  'assets/galeria/culto-5.jpg',
  'assets/galeria/culto-6.jpg',
  'assets/galeria/culto-7.jpg',
  'assets/galeria/culto-8.jpg',
  'assets/galeria/culto-9.jpg',
];
/* ===================== fim da configuração ===================== */

(() => {
  const btn=document.getElementById('btnDrive');
  if(ALBUM_DRIVE && ALBUM_DRIVE!=='#'){ btn.href=ALBUM_DRIVE; }
  else { btn.addEventListener('click',e=>{e.preventDefault();alert('Defina o link do álbum em ALBUM_DRIVE (no topo do script da galeria.html).');}); }

  const mos=document.getElementById('mosaico');
  FOTOS.forEach((src,idx)=>{
    const a=document.createElement('a');
    a.href=src; a.target='_blank'; a.rel='noopener'; a.setAttribute('aria-label','Ver foto '+(idx+1)+' em tamanho cheio');
    const img=document.createElement('img');
    img.src=src; img.alt='Foto do culto '+(idx+1); img.loading=idx<2?'eager':'lazy';
    a.appendChild(img); mos.appendChild(a);
  });
})();
</script>
</body>
</html>
